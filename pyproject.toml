[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "1c-agent-platform"
version = "0.1.0"
description = "Platform for working with 1C configurations through MCP"
requires-python = ">=3.11"
readme = "README.md"
authors = [
    { name = "1C Agent Platform Team" },
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = []
